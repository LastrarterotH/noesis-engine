<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>noesis og</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;600;700&family=Fraunces:ital,opsz,wght@1,9..144,500;1,9..144,600&display=swap');
  html, body { margin: 0; padding: 0; background: #1F2547; }
  body {
    width: 1200px; height: 630px;
    font: 16px/1.5 'Plus Jakarta Sans', system-ui, -apple-system, sans-serif;
    color: #fbfaf6; overflow: hidden;
    background: radial-gradient(circle at 20% 30%, #2a3157 0%, #1a1f3f 60%, #0e1430 100%);
  }
  .frame { position: relative; width: 100%; height: 100%; padding: 64px 72px; box-sizing: border-box; }
  .brand {
    position: absolute; top: 56px; left: 72px;
    display: flex; align-items: center; gap: 14px;
  }
  .brand .dot { width: 16px; height: 16px; border-radius: 999px; background: #0071e3; box-shadow: 0 0 24px rgba(0,113,227,0.6); }
  .brand .name { font: 600 26px/1 'Plus Jakarta Sans', sans-serif; color: #fbfaf6; letter-spacing: -0.01em; }
  .brand .dot-amber { color: #F4AC1D; }

  .grid {
    position: absolute; top: 130px; right: 72px; left: 72px;
    display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px;
    height: 200px;
  }
  .tile {
    border-radius: 10px; overflow: hidden; border: 1px solid rgba(255,255,255,0.08);
    background: #0e1430;
  }
  .tile img { width: 100%; height: 100%; object-fit: cover; display: block; }

  .headline {
    position: absolute; left: 72px; right: 72px; top: 370px;
    font: 600 64px/1.05 'Plus Jakarta Sans', sans-serif;
    letter-spacing: -0.022em;
  }
  .headline .hl { color: #0071e3; }
  .lead {
    position: absolute; left: 72px; right: 360px; top: 510px;
    font: 500 22px/1.4 'Plus Jakarta Sans', sans-serif;
    color: rgba(251,250,246,0.75);
  }
  .meta {
    position: absolute; right: 72px; bottom: 56px;
    text-align: right;
  }
  .meta .tag {
    font: 600 12px/1 'Plus Jakarta Sans', sans-serif;
    letter-spacing: 0.18em; text-transform: uppercase;
    color: #F4AC1D; margin-bottom: 8px;
  }
  .meta .count {
    font: 600 18px/1 'Plus Jakarta Sans', sans-serif;
    color: rgba(251,250,246,0.85);
  }
</style>
</head>
<body>
<div class="frame">
  <div class="brand">
    <span class="dot"></span>
    <span class="name">noesis<span class="dot-amber">.</span></span>
  </div>
  <div class="grid">
    <div class="tile"><img src="../previews/scene-01.png"></div>
    <div class="tile"><img src="../previews/scene-02.png"></div>
    <div class="tile"><img src="../previews/scene-03.png"></div>
    <div class="tile"><img src="../previews/scene-04.png"></div>
    <div class="tile"><img src="../previews/scene-05.png"></div>
    <div class="tile"><img src="../previews/scene-06.png"></div>
    <div class="tile"><img src="../previews/scene-07.png"></div>
    <div class="tile"><img src="../previews/scene-08.png"></div>
  </div>
  <div class="headline">Conceptos que se <span class="hl">ven</span>,<br>no que se memorizan.</div>
  <div class="lead">Engine narrativo para incrustar animaciones explicativas en cualquier página.</div>
  <div class="meta">
    <div class="tag">Engine narrativo</div>
    <div class="count">8 escenas publicadas</div>
  </div>
</div>
</body>
</html>
